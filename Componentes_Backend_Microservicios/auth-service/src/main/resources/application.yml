server:
  port: 8084

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:h2:file:/data/authdb;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

jwt:
  secret: ${JWT_SECRET:SmartLogixSuperSecretKeyForJWT2024PlatformMicroservicesArchitecture!!}
  expiration-ms: 86400000

smartlogix:
  internal-api-key: ${SMARTLOGIX_INTERNAL_API_KEY:SmartLogixInternalKey2026!}
  welcome-coupon-code: ${SMARTLOGIX_WELCOME_COUPON_CODE:BIENVENIDA10}
  welcome-coupon-percent: ${SMARTLOGIX_WELCOME_COUPON_PERCENT:10}
  admin:
    email: ${SMARTLOGIX_ADMIN_EMAIL:admin@smartlogix.com}
    password: ${SMARTLOGIX_ADMIN_PASSWORD:admin1}
    first-name: ${SMARTLOGIX_ADMIN_FIRST_NAME:Administrador}
    last-name: ${SMARTLOGIX_ADMIN_LAST_NAME:SmartLogix}

management:
  endpoints:
    web:
      exposure:
        include: health,info

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
