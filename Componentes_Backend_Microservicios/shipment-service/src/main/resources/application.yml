server:
  port: 8083

spring:
  application:
    name: shipment-service
  datasource:
    url: jdbc:h2:file:/data/shipmentdb;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

jwt:
  secret: ${JWT_SECRET:SmartLogixSuperSecretKeyForJWT2024PlatformMicroservicesArchitecture!!}

smartlogix:
  internal-api-key: ${SMARTLOGIX_INTERNAL_API_KEY:SmartLogixInternalKey2026!}

management:
  endpoints:
    web:
      exposure:
        include: health,info

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
